# Sets the three-state status of a CurrentEmployee profile by calling the prod
# admin API. Pick an employee + a status (Available, Placed, or Disabled) and
# the workflow PUTs /api/current-employees/:slug/status with the
# EMPLOYEES_SERVICE_TOKEN. The api writes the JSON, busts its Valkey cache, and
# pings the storefront to revalidate the ISR tag — so the public site updates
# within seconds, not minutes.
#
# Required repo secrets:
#   EMPLOYEES_API_URL        e.g. https://findcarehelper.com/api
#   EMPLOYEES_SERVICE_TOKEN  matches the api's EMPLOYEES_SERVICE_TOKEN
#
# The dropdown of full names is regenerated from the LIVE roster by the
# "Sync Admin Data → Git" workflow (schedule + on demand). In normal operation
# the admin tab (Employees) is the primary way to manage status; this workflow
# is a no-login fallback for when admin access is unavailable.

name: 1👁️ Set Employee Status

on:
  workflow_dispatch:
    inputs:
      employee:
        description: 'Employee (full name)'
        required: true
        type: choice
        options:
          # >>> auto-generated by scripts/sync-employee-workflow-options.mjs — do not edit
          - "Phyo Thet Khaing"
          - "Moe Aye Nwe"
          - "Naw Eh Moo Wah"
          - "War War Win"
          - "Waa Myaing"
          - "Eaindar Kyaw Lat"
          - "Naw Thay Mu"
          - "Phoo Wai Paing"
          - "Nang Khan Bo"
          - "Nyein Nyein Aye"
          - "Nant Ai Tha Sein"
          - "Phway Pa Pa Hlaing"
          - "Mhwe Pa Pa Hlaing"
          - "Naw Zar Blut"
          - "Mai Aye Nandar Win"
          - "Om Hein"
          - "Agnes"
          - "test"
          # <<< end auto-generated
      status:
        description: 'New status for the selected profile'
        required: true
        type: choice
        default: 'Placed'
        options:
          - 'Available'
          - 'Placed'
          - 'Disabled'

jobs:
  set-status:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve status keyword
        id: resolve
        env:
          STATUS_INPUT: ${{ github.event.inputs.status }}
        run: |
          set -euo pipefail
          case "$STATUS_INPUT" in
            Available) echo "status=active" >> "$GITHUB_OUTPUT" ;;
            Placed) echo "status=placed" >> "$GITHUB_OUTPUT" ;;
            Disabled) echo "status=disabled" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::Unknown status: $STATUS_INPUT"
              exit 1
              ;;
          esac

      - name: Call prod API
        id: set
        env:
          EMPLOYEE_NAME: ${{ github.event.inputs.employee }}
          STATUS: ${{ steps.resolve.outputs.status }}
          EMPLOYEES_API_URL: ${{ secrets.EMPLOYEES_API_URL }}
          EMPLOYEES_SERVICE_TOKEN: ${{ secrets.EMPLOYEES_SERVICE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EMPLOYEES_API_URL:-}" ] || [ -z "${EMPLOYEES_SERVICE_TOKEN:-}" ]; then
            echo "::error::EMPLOYEES_API_URL and EMPLOYEES_SERVICE_TOKEN secrets must be set on this repo."
            exit 1
          fi
          node scripts/toggle-employee.mjs --name "$EMPLOYEE_NAME" --status "$STATUS" | tee /tmp/toggle.log

      - name: Write summary
        if: always()
        env:
          EMPLOYEE_NAME: ${{ github.event.inputs.employee }}
          STATUS_INPUT: ${{ github.event.inputs.status }}
          OPERATOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LOG_LINE="(no script output captured)"
          if [ -f /tmp/toggle.log ]; then
            LOG_LINE=$(tail -n 1 /tmp/toggle.log)
          fi
          {
            echo "## Set Employee Status"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Employee** | ${EMPLOYEE_NAME} |"
            echo "| **New status** | ${STATUS_INPUT} |"
            echo "| **API response** | ${LOG_LINE} |"
            echo "| **Triggered by** | @${OPERATOR} |"
            echo "| **Run completed** | \`${NOW}\` |"
            echo ""
            echo "Permalink: ${RUN_URL}"
            echo ""
            echo "> Tip: after setting a profile to **Disabled**, re-run **Submit Sitemap to Google Search Console** so Google picks up the removal sooner."
          } >> "$GITHUB_STEP_SUMMARY"

  # After the prod write succeeds, mirror the fresh state back into git so the
  # repo seed (the migration/backup copy) tracks prod automatically — no manual
  # sync needed. Skipped if the status change above failed.
  sync:
    needs: set-status
    uses: ./.github/workflows/sync-admin-data.yml
    secrets: inherit
