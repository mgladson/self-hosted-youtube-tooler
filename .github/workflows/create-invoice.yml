# Creates an invoice by calling the prod admin API, then (optionally) emails the
# rendered PDF to the business mailbox. Fill in the form and run — the workflow
# POSTs /api/invoices with the EMPLOYEES_SERVICE_TOKEN to create + number the
# invoice (it lands in the admin Invoices tab and on the prod data volume), then
# POSTs /api/invoices/:id/email to send the PDF. No git commit involved; the API
# is the single write path, the same model as the Toggle Employee workflow.
#
# Required repo secrets (already set for Toggle Employee — reused here):
#   EMPLOYEES_API_URL        e.g. https://findcarehelper.com/api
#   EMPLOYEES_SERVICE_TOKEN  matches the api's EMPLOYEES_SERVICE_TOKEN
#
# One worker (line item) per run — for a multi-worker invoice use the admin
# Invoices tab. The PDF is emailed to the business mailbox (findcarehelper@gmail.com),
# not to the customer; forward it from there.

name: 0🧾 Create Invoice

on:
  workflow_dispatch:
    inputs:
      worker_name:
        description: 'Worker / employee full name (as it appears on the invoice)'
        required: true
        type: string
      amount:
        description: 'Placement fee (SGD) — numbers only, e.g. 1500'
        required: true
        type: string
      agency:
        description: 'Pick a saved agency (its name, address & email auto-fill), or choose "Type a new agency below" and fill the three fields underneath.'
        required: true
        type: choice
        default: '✏️ Type a new agency below'
        options:
          - '✏️ Type a new agency below'
          # >>> auto-generated by scripts/sync-agency-workflow-options.mjs — do not edit
          - "Vince Maid Agency"
          - "TBD"
          - "Helper Express"
          - "Jaya Maids"
          # <<< end auto-generated
      bill_to_name:
        description: 'NEW agency only: name to bill. Ignored when you pick a saved agency above. Required if you chose "Type a new agency below".'
        required: false
        type: string
      bill_to_address:
        description: "NEW agency only: billing address. Use ' | ' to separate lines, e.g. 10 Anson Rd | #20-05 | Singapore 079903. A saved agency's address auto-fills."
        required: false
        type: string
      bill_to_email:
        description: "NEW agency only: customer email printed on the PDF. A saved agency's email auto-fills. (The PDF is emailed to your business mailbox, not here.)"
        required: false
        type: string
      invoice_date:
        description: 'Invoice date AND placement date (YYYY-MM-DD). Leave blank for today. Payment is due 7 days later.'
        required: false
        type: string
      send_email:
        description: 'Email the finished PDF to the business mailbox after creating? findcarehelper@gmail.com'
        required: true
        type: choice
        default: 'Yes'
        options:
          - 'Yes'
          - 'No'

# Serialize runs so two invoices created at once can't race on the next
# invoice number. Queue rather than cancel — never abort an in-flight create.
concurrency:
  group: create-invoice
  cancel-in-progress: false

jobs:
  create:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create invoice via prod API
        id: create
        env:
          EMPLOYEES_API_URL: ${{ secrets.EMPLOYEES_API_URL }}
          EMPLOYEES_SERVICE_TOKEN: ${{ secrets.EMPLOYEES_SERVICE_TOKEN }}
          INVOICE_WORKER_NAME: ${{ github.event.inputs.worker_name }}
          INVOICE_AMOUNT: ${{ github.event.inputs.amount }}
          INVOICE_AGENCY: ${{ github.event.inputs.agency }}
          INVOICE_BILL_TO_NAME: ${{ github.event.inputs.bill_to_name }}
          INVOICE_BILL_TO_ADDRESS: ${{ github.event.inputs.bill_to_address }}
          INVOICE_BILL_TO_EMAIL: ${{ github.event.inputs.bill_to_email }}
          INVOICE_DATE: ${{ github.event.inputs.invoice_date }}
          INVOICE_SEND_EMAIL: ${{ github.event.inputs.send_email }}
        run: |
          set -euo pipefail
          if [ -z "${EMPLOYEES_API_URL:-}" ] || [ -z "${EMPLOYEES_SERVICE_TOKEN:-}" ]; then
            echo "::error::EMPLOYEES_API_URL and EMPLOYEES_SERVICE_TOKEN secrets must be set on this repo."
            exit 1
          fi
          node scripts/create-invoice.mjs | tee /tmp/create-invoice.log

      - name: Write summary
        if: always()
        env:
          WORKER_NAME: ${{ github.event.inputs.worker_name }}
          AMOUNT: ${{ github.event.inputs.amount }}
          AGENCY: ${{ github.event.inputs.agency }}
          BILL_TO: ${{ github.event.inputs.bill_to_name }}
          INVOICE_DATE: ${{ github.event.inputs.invoice_date }}
          SEND_EMAIL: ${{ github.event.inputs.send_email }}
          OPERATOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RESULT_LINE="(no script output captured)"
          if [ -f /tmp/create-invoice.log ]; then
            RESULT_LINE=$(tail -n 1 /tmp/create-invoice.log)
          fi
          # Bill-to shown = the picked saved agency, or the typed name for a new one.
          BILL_TO_DISPLAY="${BILL_TO}"
          case "${AGENCY}" in
            ""|*"Type a new agency"*) : ;;
            *) BILL_TO_DISPLAY="${AGENCY}" ;;
          esac
          {
            echo "## Create Invoice"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Worker** | ${WORKER_NAME} |"
            echo "| **Amount (SGD)** | ${AMOUNT} |"
            echo "| **Bill to** | ${BILL_TO_DISPLAY:-—} |"
            echo "| **Invoice date** | ${INVOICE_DATE:-today} |"
            echo "| **Due date** | 7 days after invoice date |"
            echo "| **Email PDF** | ${SEND_EMAIL} |"
            echo "| **Result** | ${RESULT_LINE} |"
            echo "| **Triggered by** | @${OPERATOR} |"
            echo "| **Run completed** | \`${NOW}\` |"
            echo ""
            echo "Permalink: ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
