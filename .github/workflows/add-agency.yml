# Adds a new receiving agency to the prod admin API (the single write path that
# also backs the admin Agencies tab and the Create Invoice workflow), then
# mirrors the updated store back into git and commits it. Fill in the form and
# run: the workflow POSTs /api/agencies with the EMPLOYEES_SERVICE_TOKEN so the
# agency goes live immediately — and appears in the invoice bill-to dropdown —
# then re-runs the agency sync so data/agencies.json and the Create Invoice
# dropdown stay a faithful backup.
#
# This workflow only ADDS, and refuses a name that already exists so it can't
# fork a duplicate. To EDIT or DELETE an agency, use the admin Agencies tab.
#
# Required repo secrets (shared with the other agency/employee workflows):
#   EMPLOYEES_API_URL        e.g. https://findcarehelper.com/api
#   EMPLOYEES_SERVICE_TOKEN  matches the api's EMPLOYEES_SERVICE_TOKEN
#   WORKFLOW_SYNC_PAT        a PAT with push access to this repo AND the
#                            `workflow` scope (classic) / Contents+Workflows
#                            write (fine-grained) — GitHub blocks the default
#                            GITHUB_TOKEN from committing changes under
#                            .github/workflows/, and the commit updates the
#                            Create Invoice dropdown there.

name: 2🏢 Add Agency

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Agency name (must not already exist — use the admin Agencies tab to edit an existing one)'
        required: true
        type: string
      address:
        description: "Billing address. Use ' | ' to separate lines, e.g. 35 Lorong 1 Realty Park | Singapore 536977. Leave blank to fill in later."
        required: false
        type: string
      email:
        description: 'Billing email (optional)'
        required: false
        type: string

# Reuse the Sync Agency Dropdown concurrency group: an add and a sync must never
# rewrite data/agencies.json + the dropdown or push main at the same time.
concurrency:
  group: sync-agency-options
  cancel-in-progress: false

jobs:
  add:
    runs-on: ubuntu-latest
    permissions:
      # GITHUB_TOKEN is read-only here; the commit is pushed with WORKFLOW_SYNC_PAT.
      contents: read
    steps:
      - name: Check sync token
        env:
          SYNC_PAT: ${{ secrets.WORKFLOW_SYNC_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${SYNC_PAT:-}" ]; then
            echo "::error::WORKFLOW_SYNC_PAT is not set. It must be a PAT with push access to this repo AND the 'workflow' scope (classic) or Contents+Workflows write (fine-grained), since GitHub blocks the default GITHUB_TOKEN from committing changes under .github/workflows/."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Read with the default token; the privileged push uses WORKFLOW_SYNC_PAT
          # in the commit step, so a token problem surfaces only at the push.
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Add agency via prod API
        id: add
        env:
          EMPLOYEES_API_URL: ${{ secrets.EMPLOYEES_API_URL }}
          EMPLOYEES_SERVICE_TOKEN: ${{ secrets.EMPLOYEES_SERVICE_TOKEN }}
          AGENCY_NAME: ${{ github.event.inputs.name }}
          AGENCY_ADDRESS: ${{ github.event.inputs.address }}
          AGENCY_EMAIL: ${{ github.event.inputs.email }}
        run: |
          set -euo pipefail
          if [ -z "${EMPLOYEES_API_URL:-}" ] || [ -z "${EMPLOYEES_SERVICE_TOKEN:-}" ]; then
            echo "::error::EMPLOYEES_API_URL and EMPLOYEES_SERVICE_TOKEN secrets must be set on this repo."
            exit 1
          fi
          node scripts/add-agency.mjs | tee /tmp/add-agency.log

      - name: Mirror agencies into git
        env:
          EMPLOYEES_API_URL: ${{ secrets.EMPLOYEES_API_URL }}
          EMPLOYEES_SERVICE_TOKEN: ${{ secrets.EMPLOYEES_SERVICE_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/sync-agency-workflow-options.mjs

      - name: Commit if changed
        env:
          GH_PAT: ${{ secrets.WORKFLOW_SYNC_PAT }}
        run: |
          set -euo pipefail
          if git diff --quiet -- data/agencies.json .github/workflows/create-invoice.yml; then
            echo "Nothing to commit — the agency store and dropdown are already mirrored."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/agencies.json .github/workflows/create-invoice.yml
          git commit -m "chore: add agency + sync Create Invoice dropdown [skip ci]"
          # Push only here, with the PAT — the one privileged write. A classic PAT
          # needs `repo` + `workflow` scope and, on the Block-Farms org, SAML-SSO
          # authorization, or this push 401/403s while checkout above still works.
          git push "https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main

      - name: Write summary
        if: always()
        env:
          AGENCY_NAME: ${{ github.event.inputs.name }}
          AGENCY_ADDRESS: ${{ github.event.inputs.address }}
          AGENCY_EMAIL: ${{ github.event.inputs.email }}
          OPERATOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RESULT_LINE="(no script output captured)"
          if [ -f /tmp/add-agency.log ]; then
            RESULT_LINE=$(tail -n 1 /tmp/add-agency.log)
          fi
          {
            echo "## Add Agency"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Name** | ${AGENCY_NAME} |"
            echo "| **Address** | ${AGENCY_ADDRESS:-—} |"
            echo "| **Email** | ${AGENCY_EMAIL:-—} |"
            echo "| **Result** | ${RESULT_LINE} |"
            echo "| **Triggered by** | @${OPERATOR} |"
            echo "| **Run completed** | \`${NOW}\` |"
            echo ""
            echo "Permalink: ${RUN_URL}"
            echo ""
            echo "> To edit or remove an agency, use the admin **Agencies** tab."
          } >> "$GITHUB_STEP_SUMMARY"
